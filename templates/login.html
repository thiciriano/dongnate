{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg border border-dn-green-pale p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-dn-green mb-2">Bem-vindo de volta</h1>
            <p class="text-dn-ink-mid">Acesse sua conta para continuar ajudando.</p>
        </div>
        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-dn-ink-mid mb-1">E-mail</label>
                <input type="email" name="email" class="input-field" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-dn-ink-mid mb-1">Senha</label>
                <input type="password" name="senha" class="input-field" placeholder="••••••••" required>
            </div>
            {% if request.query_params.get('error') %}
            <div class="text-dn-error text-sm font-bold text-center">E-mail ou senha incorretos.</div>
            {% endif %}
            <button type="submit" class="btn-primary w-full py-4 mt-4 uppercase tracking-widest text-xs">Entrar</button>
        </form>
        <div class="mt-6 text-center">
            <p class="text-dn-ink-mid text-sm">Não tem uma conta? 
                <a href="/register" class="text-dn-green font-bold hover:underline">Cadastre-se</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
